name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build united.exe (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[windows]" pyinstaller

      - name: Build united.exe
        shell: pwsh
        run: |
          python -m PyInstaller united.spec --noconfirm --clean
          if (-not (Test-Path dist\united.exe)) { throw "dist\united.exe missing" }
          $mb = [math]::Round((Get-Item dist\united.exe).Length / 1MB, 1)
          Write-Host "Built dist\united.exe ($mb MB)"

      - name: Smoke test CLI
        shell: pwsh
        run: |
          python -m cocoapatcher.cli.main --help
          python -m cocoapatcher.cli.main list-macos
          python -m cocoapatcher.cli.main efi-marketplace list --refresh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: united-windows-${{ github.sha }}
          path: dist/united.exe
          retention-days: 14
          if-no-files-found: error
