name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & publish united.exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve release tag
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if ($tag -notmatch '^v') { throw "Tag must start with v (got: $tag)" }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Release tag: $tag"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install & build
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[windows]" pyinstaller
          python -m PyInstaller united.spec --noconfirm --clean
          if (-not (Test-Path dist\united.exe)) { throw "Build failed" }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: cocoapatcher ${{ steps.meta.outputs.tag }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == 'true' }}
          generate_release_notes: true
          files: dist/united.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
